<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chromaclawd — Options</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f9f9fb;
      margin: 0;
      padding: 32px 24px;
    }

    .container { max-width: 680px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }

    .logo { font-size: 22px; color: #1a1aff; }

    section { margin-bottom: 36px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .row { display: flex; gap: 8px; }

    input[type="password"],
    input[type="text"],
    textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }

    input[type="password"] { font-family: monospace; }

    textarea { resize: vertical; }

    button {
      padding: 8px 16px;
      background: #1a1aff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: #0000cc; }

    .hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .type-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .type-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #f3f4f6;
      cursor: pointer;
      user-select: none;
    }

    .type-header-left { display: flex; align-items: center; gap: 10px; }
    .type-name { font-weight: 600; font-size: 13px; }
    .type-domains { font-size: 11px; color: #6b7280; }
    .type-toggle { font-size: 11px; color: #6b7280; }

    .type-body {
      display: none;
      padding: 14px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    .type-body.open { display: block; }
    .type-body label { margin-top: 10px; }
    .type-body label:first-child { margin-top: 0; }

    #status {
      font-size: 12px;
      color: #16a34a;
      font-weight: 500;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="logo">✦</span>
      <h1>Chromaclawd</h1>
    </header>

    <section>
      <label for="apiKey">Anthropic API Key</label>
      <div class="row">
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" />
        <button id="saveApiKey">Save</button>
      </div>
      <p class="hint">Stored in chrome.storage.sync — only accessible to this extension.</p>
    </section>

    <section>
      <label>Content Type Prompts</label>
      <div id="contentTypes"></div>
      <div class="row" style="margin-top: 14px; align-items: center;">
        <button id="savePrompts">Save All Prompts</button>
        <button id="resetPrompts" style="background: #fff; color: #6b7280; border: 1px solid #d1d5db;">Reset to defaults</button>
        <span id="status"></span>
      </div>
    </section>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
